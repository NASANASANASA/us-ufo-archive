<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>US UAP Archive</title>
  <script>
    (function(){
      // 1. 优先使用上次访问的语言目录
      var dirs={en:1,'zh-Hans':1,'zh-Hant':1,ja:1,es:1,pt:1,ru:1,fr:1,de:1,ko:1,ar:1};
      var stored=localStorage.getItem('uap-dir');
      if(stored&&dirs[stored]){
        location.replace(location.href.split('?')[0].replace(/\/?$/,'/')+stored+'/');
        return;
      }
      // 2. 首次访问：按浏览器主语言自动检测
      var l=(navigator.language||'en').toLowerCase();
      var dir=/^zh-(tw|hk|mo|hant)/.test(l)?'zh-Hant':
               /^zh/.test(l)?'zh-Hans':
               /^ja/.test(l)?'ja':
               /^ko/.test(l)?'ko':
               /^pt/.test(l)?'pt':
               /^ru/.test(l)?'ru':
               /^fr/.test(l)?'fr':
               /^de/.test(l)?'de':
               /^ar/.test(l)?'ar':
               /^es/.test(l)?'es':'en';
      location.replace(location.href.split('?')[0].replace(/\/?$/,'/')+dir+'/');
    })();
  </script>
  <noscript><meta http-equiv="refresh" content="0;url=en/"></noscript>
</head>
<body></body>
</html>
